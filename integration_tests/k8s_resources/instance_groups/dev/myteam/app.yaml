apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: myapp
spec:
  image: ghcr.io/navikt/myapp:v1.2.3
  replicas:
    min: 2
    max: 4

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
  labels:
    app: myapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
        - name: myapp
          image: ghcr.io/navikt/myapp:v1.2.3

---
# Current ReplicaSet (revision 2) - fully rolled out
apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: myapp-abc123
  labels:
    app: myapp
  annotations:
    deployment.kubernetes.io/revision: "2"
  creationTimestamp: "2024-01-15T10:00:00Z"
  ownerReferences:
    - apiVersion: apps/v1
      kind: Deployment
      name: myapp
      uid: deploy-uid-1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
        - name: myapp
          image: ghcr.io/navikt/myapp:v1.2.3
          env:
            - name: APP_ENV
              value: production
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: myapp-config
                  key: db_host
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: myapp-secret
                  key: api_key
          envFrom:
            - configMapRef:
                name: myapp-envs
          volumeMounts:
            - name: config-volume
              mountPath: /etc/config
            - name: secret-volume
              mountPath: /etc/secret
      volumes:
        - name: config-volume
          configMap:
            name: myapp-config
        - name: secret-volume
          secret:
            secretName: myapp-secret
status:
  replicas: 2
  readyReplicas: 2

