apiVersion: nais.io/v1
kind: Naisjob
metadata:
  name: myjob
spec:
  image: europe-north1-docker.pkg.dev/nais/navikt/myjob:v1.2.3
  schedule: "0 0 * * *"

---
# Manually triggered run, fully completed.
# Exercises:
#   - JobRun.image (spec.template.spec.containers[0].image must be preserved)
#   - JobRun.trigger (the cronjob.kubernetes.io/instantiate and
#     nais.io/instantiated-by annotations must be preserved)
#   - JobRun.status.message (statusMessage uses completionTarget which reads
#     spec.completions / spec.parallelism)
apiVersion: batch/v1
kind: Job
metadata:
  name: myjob-manual
  labels:
    app: myjob
  annotations:
    cronjob.kubernetes.io/instantiate: manual
    nais.io/instantiated-by: user@example.com
spec:
  completions: 3
  parallelism: 2
  template:
    spec:
      containers:
        - name: myjob
          image: europe-north1-docker.pkg.dev/nais/navikt/myjob:v1.2.3
status:
  startTime: "2024-01-15T10:00:00Z"
  completionTime: "2024-01-15T10:05:00Z"
  succeeded: 3
  failed: 0

---
# Automatically triggered run (no manual-trigger annotations).
# Uses the default completionTarget of 1 (no completions/parallelism set).
apiVersion: batch/v1
kind: Job
metadata:
  name: myjob-auto
  labels:
    app: myjob
spec:
  template:
    spec:
      containers:
        - name: myjob
          image: europe-north1-docker.pkg.dev/nais/navikt/myjob:v2.0.0
status:
  startTime: "2024-01-15T11:00:00Z"
  active: 1
