apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: "{{ .Release.Name }}"
  labels:
    app: "{{ .Release.Name }}"
  annotations:
    haproxy.org/timeout-server: "600s"
    haproxy.org/response-set-header: X-Robots-Tag "noindex"
spec:
  ingressClassName: "external-haproxy"
  rules:
    - host: "{{ .Values.host }}"
      http:
        paths:
          - backend:
              service:
                name: "{{ .Release.Name }}"
                port:
                  name: http
            path: /graphql
            pathType: Prefix
          - backend:
              service:
                name: "{{ .Release.Name }}"
                port:
                  name: http
            path: /oauth2/
            pathType: Prefix
          - backend:
              service:
                name: "{{ .Release.Name }}"
                port:
                  name: rest
            path: /teams/
            pathType: Prefix
          - backend:
              service:
                name: "{{ .Release.Name }}"
                port:
                  name: rest
            path: /api/v1/
            pathType: Prefix
