apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: "{{ .Release.Name }}"
  labels:
    app: "{{ .Release.Name }}"
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Robots-Tag: noindex";
    haproxy.org/response-set-header: "X-Robots-Tag noindex"
spec:
  ingressClassName: {{ .Values.ingressClassName }}
  rules:
    - host: "{{ .Values.host }}"
      http:
        paths:
          - backend:
              service:
                name: "{{ .Release.Name }}"
                port:
                  name: http
            path: /graphql
            pathType: Prefix
          - backend:
              service:
                name: "{{ .Release.Name }}"
                port:
                  name: http
            path: /oauth2/
            pathType: Prefix
          - backend:
              service:
                name: "{{ .Release.Name }}"
                port:
                  name: rest
            path: /teams/
            pathType: Prefix
          - backend:
              service:
                name: "{{ .Release.Name }}"
                port:
                  name: rest
            path: /api/v1/
            pathType: Prefix
---
{{- range .Values.additionalIngressClassNames }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: "{{ $.Release.Name }}-{{ . }}"
  labels:
    app: "{{ $.Release.Name }}"
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Robots-Tag: noindex";
    haproxy.org/response-set-header: "X-Robots-Tag noindex"
spec:
  ingressClassName: {{ . }}
  rules:
    - host: "{{ $.Values.host }}"
      http:
        paths:
          - backend:
              service:
                name: "{{ $.Release.Name }}"
                port:
                  name: http
            path: /graphql
            pathType: Prefix
          - backend:
              service:
                name: "{{ $.Release.Name }}"
                port:
                  name: http
            path: /oauth2/
            pathType: Prefix
          - backend:
              service:
                name: "{{ $.Release.Name }}"
                port:
                  name: rest
            path: /teams/
            pathType: Prefix
          - backend:
              service:
                name: "{{ $.Release.Name }}"
                port:
                  name: rest
            path: /api/v1/
            pathType: Prefix
---
{{- end }}
